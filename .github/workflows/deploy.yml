name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare EC2 directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Stop existing containers and remove the old directory to ensure a clean copy
            if [ -d /home/${{ secrets.EC2_USER }}/phoenix-eximm ]; then
              cd /home/${{ secrets.EC2_USER }}/phoenix-eximm
              sudo docker compose down || true
              cd ..
              sudo rm -rf phoenix-eximm
            fi
            
            # CRITICAL: Clean up old Docker images to free up disk space!
            sudo docker system prune -af
            
            # Additional cleanup to aggressively free up disk space
            sudo journalctl --vacuum-time=1d
            sudo apt-get clean
            sudo rm -rf /tmp/*
            
            mkdir -p /home/${{ secrets.EC2_USER }}/phoenix-eximm

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/${{ secrets.EC2_USER }}/phoenix-eximm"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the project directory
            cd /home/${{ secrets.EC2_USER }}/phoenix-eximm
            
            # Create/Update .env file in backend directory
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" > backend/.env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> backend/.env
            echo "ADMIN_USER=${{ secrets.ADMIN_USER }}" >> backend/.env
            echo "ADMIN_PASS=${{ secrets.ADMIN_PASS }}" >> backend/.env
            
            # Build and restart Docker containers
            sudo docker compose down
            sudo docker compose up -d --build

            # Install Nginx on the host if not already installed
            if ! command -v nginx &> /dev/null; then
              sudo apt-get update
              sudo apt-get install nginx -y
            fi

            # Configure Nginx reverse proxy
            echo 'server {' | sudo tee /etc/nginx/sites-available/phoenixeximm
            echo '    listen 80;' | sudo tee -a /etc/nginx/sites-available/phoenixeximm
            echo '    server_name phoenixeximm.com www.phoenixeximm.com;' | sudo tee -a /etc/nginx/sites-available/phoenixeximm
            echo '    location / {' | sudo tee -a /etc/nginx/sites-available/phoenixeximm
            echo '        proxy_pass http://127.0.0.1:8080;' | sudo tee -a /etc/nginx/sites-available/phoenixeximm
            echo '        proxy_set_header Host $host;' | sudo tee -a /etc/nginx/sites-available/phoenixeximm
            echo '        proxy_set_header X-Real-IP $remote_addr;' | sudo tee -a /etc/nginx/sites-available/phoenixeximm
            echo '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;' | sudo tee -a /etc/nginx/sites-available/phoenixeximm
            echo '        proxy_set_header X-Forwarded-Proto $scheme;' | sudo tee -a /etc/nginx/sites-available/phoenixeximm
            echo '    }' | sudo tee -a /etc/nginx/sites-available/phoenixeximm
            echo '}' | sudo tee -a /etc/nginx/sites-available/phoenixeximm
            sudo ln -sf /etc/nginx/sites-available/phoenixeximm /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo systemctl restart nginx

            # Install Certbot if not already installed
            if ! command -v certbot &> /dev/null; then
              sudo apt-get install certbot python3-certbot-nginx -y
            fi

            # Request and configure SSL if not already done
            if [ ! -d /etc/letsencrypt/live/phoenixeximm.com ]; then
              sudo certbot --nginx -d phoenixeximm.com -d www.phoenixeximm.com --non-interactive --agree-tos --email admin@phoenixeximm.com --redirect
            fi
