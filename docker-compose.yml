version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: phoenixeximm_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: phoenixeximm_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/phoenixeximm}
      - JWT_SECRET=${JWT_SECRET:-phoenixeximm_secret_2026}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-phoenix@123}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - FROM_EMAIL=${FROM_EMAIL:-onboarding@resend.dev}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: phoenixeximm_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_uploads:
  mongodb_data:
